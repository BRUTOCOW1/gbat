<div class="golf-rounds-wrapper">
  <h2 class="rounds-title">Golf Rounds</h2>
  
  <div class="rounds-actions">
    <button class="btn btn-primary" (click)="goToRounds()">Back To All Rounds</button>
  </div>

  <!-- Two-column layout: left for the round cards, right for the selected details -->
  <div class="round-layout">


      <div *ngIf="weatherData" class="weather-widget">
        <p><strong>Weather:</strong></p>
        <p>Max Temp: {{ weatherData.temperature_2m[0] }}°C</p>
        <p>Precipitation: {{ weatherData.precipitation[0] }} mm</p>
        <p>Wind Speed: {{ weatherData.windspeed_10m[0] }} km/h</p>
      </div>

      <!-- 18 Clickable Buttons for Holes -->
    </div>

    <!-- 18 Clickable Buttons for Holes -->
    <div class="hole-buttons">
      <button
        *ngFor="let hole of holes" 
        class="btn btn-secondary"
        (click)="selectHole(hole)"
      >
        Hole {{ hole.hole_number }}
      </button>
    </div>

    <!-- Right Column: Expanded Details (only shown if selectedRound is defined) -->
    <div class="selected-round-details card" *ngIf="selectedHole">
      <h3 class="selected-round-date">{{ selectedHole.hole_number }}</h3>
      
      <button
        class="btn btn-secondary"
        (click)="goToHole(selectedHole.hole_number)"
      >
        Go To Hole
      </button>


    </div>
</div>
