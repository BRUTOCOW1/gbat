<div class="golf-shot-entry-container">

  <!-- Header -->
  <h2>Hole {{ holeNum }} · Shot Blegh Entry</h2>
  
  <!-- Add New Shot Form -->
  <form class="golf-shot-form" *ngIf="formReady"
    (submit)="onSubmit(); $event.preventDefault();">

  <h3>{{ isEditMode ? 'Edit Shot' : 'Add Shot' }}</h3>

    <!-- Club and Shot -->
    <div class="form-row">
      <div class="form-group">
        <label>Club:</label>
        <select [(ngModel)]="newShot.club_id" name="club_id" required>
          <option *ngFor="let club of golferClubs" [value]="club.id">
            {{ club.number }} – {{ club.category }}
          </option>
        </select>
        
        
        
      </div>
      
      
      <div class="form-group">
        <label>Shot Type:</label>
        <select [(ngModel)]="newShot.shot_type" name="shot_type" required>
          <option>Tee Shot</option>
          <option>Approach</option>
          <option>Layup</option>
          <option>Recovery</option>
          <option>Punchout</option>
          <option>Chip</option>
          <option>Putt</option>
        </select>
      </div>
      <!-- Penalty Selection -->
      <div class="form-group">
        <label>Penalty:</label>
        <select [(ngModel)]="newShot.penalty" name="penalty" (change)="onPenaltyChange()">
          <option value="none">None</option>
          <option value="stroke_only">Stroke Only</option>
          <option value="stroke_and_distance">Stroke and Distance</option>
          <option value="drop">Drop</option>
          <option value="unplayable">Unplayable Lie</option>
        </select>
      </div>

    </div>

    <!-- Distance, Lie, Result -->
    <div class="form-row">
      <div class="form-group">
        <label>Distance (yds):</label>
        <input type="number" [(ngModel)]="newShot.distance" name="distance">
      </div>
      <div class="form-group">
        <label>Lie:</label>
        <select [(ngModel)]="newShot.lie" name="lie">
          <option>Fairway</option>
          <option>Light Rough</option>
          <option>Thick Rough</option>
          <option>Bunker</option>
          <option>Trees</option>
          <option>Fringe</option>
          <option>Green</option>
          <option>Water</option>
          <option>OB</option>
        </select>
      </div>
      <div class="form-group">
        <label>Result:</label>
        <select [(ngModel)]="newShot.result" name="result">
          <option>Fairway</option>
          <option>Light Rough</option>
          <option>Thick Rough</option>
          <option>Bunker</option>
          <option>Fringe</option>
          <option>Green</option>
          <option>Missed Left</option>
          <option>Missed Right</option>
          <option>Short</option>
          <option>Long</option>
          <option>Water</option>
          <option>OB</option>
          <option>Made</option>
        </select>
      </div>
    </div>

    <!-- Intent + Trajectory + Shape (hide for putts) -->
    <div class="form-row" *ngIf="newShot.shot_type !== 'Putt'">
      <div class="form-group">
        <label>Intent:</label>
        <select [(ngModel)]="newShot.shot_intent" name="shot_intent">
          <option>Aggressive</option>
          <option>Smart</option>
          <option>Layup</option>
          <option>Punchout</option>
          <option>Escape</option>
          <option>Hero</option>
        </select>
      </div>

      <div class="form-group">
        <label>Trajectory:</label>
        <select [(ngModel)]="newShot.trajectory" name="trajectory">
          <option>Normal</option>
          <option>Low</option>
          <option>High</option>
        </select>
      </div>

      <div class="form-group">
        <label>Shot Shape:</label>
        <select [(ngModel)]="newShot.shape" name="shape">
          <option>Straight</option>
          <option>Draw</option>
          <option>Fade</option>
          <option>Hook</option>
          <option>Slice</option>
        </select>
      </div>
    </div>

    <!-- Contact + Location -->
    <div class="form-row">
      <div class="form-group">
        <label>Contact Quality:</label>
        <select [(ngModel)]="newShot.contact" name="contact">
          <option>Flush</option>
          <option>Thin</option>
          <option>Heavy</option>
        </select>
      </div>
      <div class="form-group">
        <label>Severity: {{ newShot.contact_severity ?? 50 }}%</label>
        <input type="range" min="0" max="100" [(ngModel)]="newShot.contact_severity" name="contact_severity">
      </div>
      <div class="form-group">
        <label>Impact Location:</label>
        <select [(ngModel)]="newShot.impact_location" name="impact_location">
          <option>Center</option>
          <option>Toe</option>
          <option>Heel</option>
          <option>Top</option>
          <option>Sky</option>
        </select>
      </div>
    </div>
    <div *ngIf="newShot.shot_type === 'Putt'" class="putt-section">
      <div class="form-group">
        <label>Putt Length (ft):</label>
        <input type="number" [(ngModel)]="newShot.putt_length" name="putt_length">
      </div>
    
      <div class="form-group">
        <label>Slope:</label>
        <select [(ngModel)]="newShot.slope" name="slope">
          <option>Flat</option>
          <option>Uphill</option>
          <option>Downhill</option>
        </select>
      </div>
    
      <div class="form-group">
        <label>Grain Direction:</label>
        <select [(ngModel)]="newShot.grain_direction" name="grain_direction">
          <option>With</option>
          <option>Against</option>
          <option>Cross</option>
        </select>
      </div>
    
      <div class="form-group">
        <label>Green Speed (stimp):</label>
        <input type="number" step="0.1" [(ngModel)]="newShot.green_speed" name="green_speed">
      </div>
    
      <div class="form-group">
        <label>Read Quality:</label>
        <select [(ngModel)]="newShot.read_quality" name="read_quality">
          <option>Good</option>
          <option>Misread</option>
          <option>Guess</option>
        </select>
      </div>
    
      <div class="form-group">
        <label>Break Pattern:</label>
        <input type="text" [(ngModel)]="break_pattern_string" name="break_pattern"
          placeholder='e.g. [{"direction": "L→R", "severity": 3}]'>
      </div>
      
    </div>
    
    <!-- Notes -->
    <div class="form-group">
      <label>Notes:</label>
      <input type="text" [(ngModel)]="newShot.notes" name="notes" placeholder="e.g. uphill, tree trouble, flyer">
    </div>

    <div class="btn-group">
      <button type="submit" class="btn btn-primary">
        {{ isEditMode ? 'Save Changes' : 'Add Shot' }}
      </button>
      <button *ngIf="isEditMode" type="button" class="btn btn-secondary" (click)="cancelEdit()">Cancel</button>
      <button *ngIf="isEditMode" type="button" class="btn btn-danger" (click)="deleteCurrentShot()">Delete</button>
    </div>
  </form>
  <button
  class="btn btn-secondary"
  (click)="goToHole(holeNumber)"
  >
  Go To Hole
  </button>
</div>
