<main class="main">
  <!-- Progress indicator -->
  <div class="progress-bar" *ngIf="step === 2">
    Step 2 of 2: Choose Clubs
  </div>

  <!-- Step 1 – Bag creation form -->
  <form *ngIf="step === 1" [formGroup]="golfBagForm" (ngSubmit)="onSubmit()" class="golf-bag-form">
    <div class="form-group">
      <label for="bagName">Golf Bag Name</label>
      <input type="text" id="bagName" formControlName="name" class="form-control" placeholder="Enter golf bag name"
        aria-label="Golf Bag Name" />
    </div>
    <button type="submit" class="btn btn-primary">Create Golf Bag</button>
  </form>

  <!-- Step 2 – Club selection -->
  <section *ngIf="step === 2" class="club-picker">
    <h3>Select clubs for "{{ golfBagForm.get('name')?.value }}"</h3>
    <div *ngIf="allClubs.length === 0">Loading clubs…</div>
    <div *ngIf="allClubs.length > 0" class="club-list">
      <div *ngFor="let club of allClubs; let $index = index" class="club-item">
        <input type="checkbox" [id]="'club-' + (club.id ?? $index)"
          (change)="toggleClubSelection(club.id ?? $index, false)" />
        <label [for]="'club-' + club.id">
          {{ club.maker }} {{ club.set }} {{ club.number }} ({{ club.category }})
        </label>
      </div>
    </div>
    <button class="btn btn-secondary" (click)="goBack()">Back</button>
    <button class="btn btn-success" (click)="saveClubs()" [disabled]="selectedClubIds.size === 0">
      Save Clubs &amp; Finish
    </button>
  </section>

  <!-- Global error message -->
  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>
</main>
